name: Validate Blueprints

on:
  push:
    branches: [main, develop]
    paths:
      - "blueprints/**/*.yaml"
      - "docs/BLUEPRINT_VERSIONS.md"
      - "scripts/release-blueprint.sh"
      - ".github/scripts/validate_blueprints.py"
      - ".github/workflows/validate.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "blueprints/**/*.yaml"
      - "docs/BLUEPRINT_VERSIONS.md"
      - "scripts/release-blueprint.sh"
      - ".github/scripts/validate_blueprints.py"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yamllint pyyaml

      - name: Lint YAML
        run: |
          yamllint -d "{extends: relaxed}" blueprints/

      - name: Validate version registry
        run: python .github/scripts/validate_blueprints.py

      - name: Validate release script syntax
        run: bash -n scripts/release-blueprint.sh
