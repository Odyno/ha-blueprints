blueprint:
  name: Door Sensor Alert
  description: >
    Send notifications when a door is opened.
    Can trigger additional actions like turning on lights or starting automations.
    Useful for security monitoring and smart home presence detection.
  domain: automation
  author: Alessandro Staniscia
  
  homeassistant:
    min_version: 2023.6.0
  
  metadata:
    version: "1.1.0"
    source_url: "https://github.com/Odyno/ha-blueprints/blob/main/blueprints/automation/door_alert.yaml"

  input:
    door_sensor:
      name: Door Sensor
      description: The contact sensor that detects door opening/closing
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    
    notification_service:
      name: Notification Service
      description: The service to use for notifications (e.g., notify.mobile_app_iphone)
      selector:
        target:
          entity:
            domain: notify
      default: notify.notify
    
    notification_title:
      name: Notification Title
      description: Title of the notification message
      selector:
        text:
      default: "Door Alert"
    
    notification_message:
      name: Notification Message
      description: >
        Message to send in notification.
        Use {{ state_attr(trigger.entity_id, 'friendly_name') }} for door name.
      selector:
        text:
          multiline: true
      default: "A door has been opened"
    
    is_presence_dependent:
      name: Only Alert When Away
      description: Only send notifications if no one is home
      selector:
        boolean:
      default: false
    
    presence_entity:
      name: Presence Entity
      description: >
        Entity to check for presence (only used if "Only Alert When Away" is enabled).
        Typically a person or group entity.
      selector:
        entity:
          domain:
            - person
            - group
      default: group.all_people

# Trigger when door opens
trigger:
  platform: state
  entity_id: !input door_sensor
  to: "on"

# Conditions
condition:
  # Check if we should alert based on presence
  - condition: template
    value_template: >
      {% if not (is_state(trigger.entity_id, 'on')) %}
        false
      {% elif states(input.is_presence_dependent) == 'off' %}
        true
      {% else %}
        {{ is_state(input.presence_entity, 'not_home') }}
      {% endif %}

# Actions
action:
  # Send notification
  - service: notify.notify
    data:
      title: !input notification_title
      message: !input notification_message
