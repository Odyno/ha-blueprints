blueprint:
  name: Temperature Threshold Alert
  description: >
    Trigger actions when temperature exceeds or falls below specified thresholds.
    Useful for HVAC control, freezing protection, and temperature monitoring alerts.
    Supports both upper and lower threshold conditions.
  domain: automation
  author: Alessandro Staniscia
  
  homeassistant:
    min_version: 2023.6.0
  
  metadata:
    version: "1.0.0"
    source_url: "https://github.com/Odyno/ha-blueprints/blob/main/blueprints/automation/temperature_threshold.yaml"

  input:
    temperature_sensor:
      name: Temperature Sensor
      description: The sensor that reports temperature values
      selector:
        entity:
          domain: sensor
          device_class: temperature
    
    high_threshold:
      name: High Temperature Threshold
      description: Trigger action when temperature exceeds this value
      selector:
        number:
          min: -50
          max: 60
          unit_of_measurement: "°C"
          step: 0.5
      default: 28
    
    low_threshold:
      name: Low Temperature Threshold
      description: Trigger action when temperature drops below this value
      selector:
        number:
          min: -50
          max: 60
          unit_of_measurement: "°C"
          step: 0.5
      default: 15
    
    action_on_high:
      name: Action for High Temperature
      description: Service call to execute when threshold is exceeded
      selector:
        action:
      default: []
    
    action_on_low:
      name: Action for Low Temperature
      description: Service call to execute when low threshold is reached
      selector:
        action:
      default: []

trigger:
  - platform: numeric_state
    entity_id: !input temperature_sensor
    above: !input high_threshold
    id: high_temp
  
  - platform: numeric_state
    entity_id: !input temperature_sensor
    below: !input low_threshold
    id: low_temp

action:
  # Execute appropriate action based on which trigger fired
  - choose:
      - conditions:
          - condition: trigger
            id: high_temp
        sequence: !input action_on_high
      
      - conditions:
          - condition: trigger
            id: low_temp
        sequence: !input action_on_low
