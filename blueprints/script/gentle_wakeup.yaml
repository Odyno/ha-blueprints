blueprint:
  name: Gentle Wake-Up Script
  description: >
    Gradually brighten lights over a specified duration to simulate natural sunrise.
    Creates a gentle wake-up experience by slowly increasing light brightness.
    Can be paired with sleep routines and morning automations.
  domain: script
  author: Alessandro Staniscia
  
  homeassistant:
    min_version: 2023.6.0
  
  metadata:
    version: "1.0.0"
    source_url: "https://github.com/Odyno/ha-blueprints/blob/main/blueprints/script/gentle_wakeup.yaml"

  input:
    light_target:
      name: Light(s) to Brighten
      description: The light(s) to gradually brighten
      selector:
        target:
          entity:
            domain: light
    
    duration_minutes:
      name: Wake-Up Duration
      description: How long to brighten the lights (in minutes)
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes
      default: 30
    
    start_brightness:
      name: Starting Brightness
      description: Initial brightness when routine starts (0-100%)
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
      default: 1
    
    end_brightness:
      name: Final Brightness
      description: Maximum brightness at end of routine (0-100%)
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
      default: 100
    
    light_color_temp:
      name: Color Temperature (Optional)
      description: Set warm color temperature during wake-up (mirek value, higher = warmer)
      selector:
        number:
          min: 154
          max: 500
          unit_of_measurement: mirek
      default: 350

sequence:
  # Turn on the light at starting brightness
  - service: light.turn_on
    target: !input light_target
    data:
      brightness_pct: !input start_brightness
      color_temp: !input light_color_temp
  
  # Gradually increase brightness
  - repeat:
      count: 30  # 30 steps for smooth transition
      sequence:
        # Wait for interval (duration_minutes / 30)
        - delay:
            minutes: "{{ (input.duration_minutes / 30) | round(2) }}"
        
        # Calculate current step brightness
        - service: light.turn_on
          target: !input light_target
          data:
            brightness_pct: >
              {{
                (
                  input.start_brightness +
                  (input.end_brightness - input.start_brightness) *
                  (repeat.index / 30)
                ) | round(0) | int
              }}
            color_temp: !input light_color_temp
